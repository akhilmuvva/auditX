name: Decentralized Automated Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy-4everland:
    name: Build & Pin to 4EVERLAND IPFS
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Project Root Dependencies
        run: npm ci

      - name: Install Dashboard Dependencies
        run: |
          cd dashboard
          npm ci

      - name: Build Static Dashboard
        run: |
          cd dashboard
          npm run build

      - name: Pin to 4EVERLAND IPFS
        uses: 4everland/pin-action@main
        with:
          EVER_TOKEN: ${{ secrets.EVER_TOKEN }}
          EVER_PROJECT_NAME: 'auditx'
          path: 'dashboard/dist'
