name: AuditX CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'
        cache: 'npm'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install System Dependencies (Slither & Mythril)
      run: |
        pip3 install slither-analyzer mythril

    - name: Install Node Dependencies
      run: |
        npm ci
        npm install -g surya

    - name: Build Dashboard
      run: |
        cd dashboard
        npm ci
        npm run build

    - name: Run Basic Tests
      run: |
        # If Hardhat test suite exists, run it
        if [ -f "hardhat.config.js" ] || [ -f "hardhat.config.ts" ]; then
          npx hardhat test
        fi
